name: Advisory Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  JUST_VERSION: "1.49.0"
  CARGO_TERM_COLOR: always

jobs:
  advisories:
    name: advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --version "${{ steps.setup.outputs.deny_version }}" --locked

      - name: Check advisories
        id: advisories
        continue-on-error: true
        run: just deny-advisories

      - name: Create issue on failure
        if: steps.advisories.outcome == 'failure'
        run: |
          BODY="$(cat <<'EOF'
          ## Advisory Check Failed

          Run `just deny-advisories` locally to see details.

          Automated issue from the weekly advisory check.
          EOF
          )"
          gh issue create \
            --title "Dependency advisory found ($(date +%Y-%m-%d))" \
            --body "$BODY"
        env:
          GH_TOKEN: ${{ github.token }}
