name: Advisory Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  JUST_VERSION: "1.49.0"
  CARGO_TERM_COLOR: always

concurrency:
  group: advisory-check
  cancel-in-progress: false

jobs:
  advisories:
    name: advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          include-deny-version: "true"

      - name: Install cargo-deny
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c # v2.78.2
        with:
          tool: cargo-deny@${{ steps.setup.outputs.deny_version }}
          fallback: none

      - name: Check advisories
        id: advisories
        continue-on-error: true
        run: just deny-advisories

      - name: Create issue on failure
        if: steps.advisories.outcome == 'failure'
        run: |
          gh label create "advisory-auto" --description "Auto-created by advisory workflow" --color "D93F0B" 2>/dev/null || true
          EXISTING=$(gh issue list --label "advisory-auto" --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Open advisory issue already exists: #$EXISTING — skipping creation"
            exit 0
          fi
          BODY="$(cat <<'EOF'
          ## Advisory Check Failed

          Run `just deny-advisories` locally to see details.

          Automated issue from the weekly advisory check.
          EOF
          )"
          gh issue create \
            --label "advisory-auto" \
            --title "Dependency advisory found ($(date +%Y-%m-%d))" \
            --body "$BODY"
        env:
          GH_TOKEN: ${{ github.token }}
