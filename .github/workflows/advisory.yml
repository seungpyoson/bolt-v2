name: Advisory Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  JUST_VERSION: "1.49.0"
  CARGO_TERM_COLOR: always

concurrency:
  group: advisory-check
  cancel-in-progress: false

jobs:
  advisories:
    name: advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "deny_version=$(just --evaluate deny_version)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_owner=$(just --evaluate rust_verification_owner)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_repo=$(just --evaluate rust_verification_source_repo)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_sha=$(just --evaluate rust_verification_source_sha)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_ci_install_script=$(just --evaluate rust_verification_ci_install_script)" >> "$GITHUB_OUTPUT"

      - name: Install managed Rust owner
        env:
          CLAUDE_CONFIG_READ_TOKEN: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
        run: |
          bash "${{ steps.shared.outputs.rust_verification_ci_install_script }}" "${{ steps.shared.outputs.rust_verification_source_repo }}" "${{ steps.shared.outputs.rust_verification_source_sha }}"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --version "${{ steps.shared.outputs.deny_version }}" --locked

      - name: Check advisories
        id: advisories
        continue-on-error: true
        run: just deny-advisories

      - name: Create issue on failure
        if: steps.advisories.outcome == 'failure'
        run: |
          gh label create "advisory-auto" --description "Auto-created by advisory workflow" --color "D93F0B" 2>/dev/null || true
          EXISTING=$(gh issue list --label "advisory-auto" --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Open advisory issue already exists: #$EXISTING — skipping creation"
            exit 0
          fi
          BODY="$(cat <<'EOF'
          ## Advisory Check Failed

          Run `just deny-advisories` locally to see details.

          Automated issue from the weekly advisory check.
          EOF
          )"
          gh issue create \
            --label "advisory-auto" \
            --title "Dependency advisory found ($(date +%Y-%m-%d))" \
            --body "$BODY"
        env:
          GH_TOKEN: ${{ github.token }}
