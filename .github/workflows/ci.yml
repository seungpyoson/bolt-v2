name: CI

on:
  pull_request:
    branches: [main]
    # paths-ignore is intentionally narrow: only explicitly-listed root-level
    # agent docs and pure-config dirs whose contents are NOT consumed by any
    # build/test/lint script. Do NOT add '**.md' or 'docs/**' — both contain
    # files that are build inputs (e.g. docs/bolt-v3/research/...audit.toml
    # is read by scripts/verify_bolt_v3_runtime_literals.py; specs/**/*.md
    # files are include_str!'d by Rust tests). Tracked in #335.
    paths-ignore:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'REASONIX.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.codex/**'
      - '.gemini/**'
      - '.opencode/**'
      - '.pi/**'
      - '.specify/**'
  push:
    # No paths-ignore on push: tag pushes and main pushes always run CI.
    # GitHub's paths-ignore behavior for tag pushes is ambiguous and could
    # silently skip the deploy lane. main pushes are infrequent and we want
    # defense-in-depth against direct-to-main commits.
    branches: [main]
    tags: ["v*"]

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request'
        && format('pr-{0}', github.event.number)
        || format('{0}-{1}', github.ref_name, github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  JUST_VERSION: "1.49.0"
  S3_DEPLOY_PATH: "s3://bolt-deploy-artifacts/artifacts/bolt-v2"
  CARGO_TERM_COLOR: always
  RUST_VERIFICATION_ROOT_BASE: ${{ github.workspace }}/.rust-verification

permissions:
  contents: read

jobs:
  detector:
    name: detector
    outputs:
      build_required: ${{ steps.build_required.outputs.value }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect build-affecting changes
        id: build_inputs_changed
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          base_ref="refs/remotes/origin/pr-base-${{ github.event.pull_request.number }}"
          head_ref="refs/remotes/origin/pr-head-${{ github.event.pull_request.number }}"
          git fetch --no-tags origin \
            "+refs/heads/${{ github.event.pull_request.base.ref }}:${base_ref}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head:${head_ref}"
          changed="$(git diff --name-only "${base_ref}...${head_ref}" -- \
            Cargo.toml \
            Cargo.lock \
            rust-toolchain.toml \
            justfile \
            .claude/rust-verification.toml \
            .github/workflows/ci.yml \
            .github/actions/setup-environment/action.yml \
            scripts/install_ci_rust_verification_owner.sh \
            scripts/require_rust_verification_owner.sh)"
          if [[ -n "$changed" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine build requirement
        id: build_required
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.build_inputs_changed.outputs.any_changed }}" == "true" ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  fmt-check:
    name: fmt-check
    needs: detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          lint-workflow-contract: "true"
          toolchain-components: rustfmt

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: fmt-check
        run: just fmt-check

  deny:
    name: deny
    needs: detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          include-deny-version: "true"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-targets: false
          key: cargo-deny

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --version "${{ steps.setup.outputs.deny_version }}" --locked

      - name: deny
        run: just deny

  clippy:
    name: clippy
    needs: detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          toolchain-components: clippy
          include-build-values: "true"
          use-default-target: "true"

      - name: Install aarch64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-targets: false
          cache-directories: ${{ steps.setup.outputs.managed_target_dir }}
          key: clippy-dual-target

      - name: check-aarch64
        run: just check-aarch64

      - name: clippy
        run: just clippy

  source-fence:
    name: source-fence
    needs: detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install source-fence Python dependencies
        run: python -m pip install --require-hashes --only-binary=:all: -r .github/requirements/source-fence.txt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-targets: false
          cache-directories: ${{ steps.setup.outputs.managed_target_dir }}
          key: source-fence-v1-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: source-fence
        env:
          # Keep targeted source-fence test binaries small enough for ubuntu-latest link/disk limits.
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: just source-fence

  test:
    name: test
    needs: [detector, source-fence]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          include-nextest-version: "true"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-targets: false
          cache-directories: ${{ steps.setup.outputs.managed_target_dir }}
          key: nextest-v2

      - name: Install cargo-nextest
        run: |
          cargo install cargo-nextest --version "${{ steps.setup.outputs.nextest_version }}" --locked

      - name: test
        env:
          # Keep CI test binaries small enough for ubuntu-latest link/disk limits.
          # This disables test debuginfo only; assertions and test logic still run.
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: just test

  build:
    name: build
    needs: detector
    if: needs.detector.outputs.build_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          include-build-values: "true"
          use-default-target: "true"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          cache-targets: false
          cache-directories: ${{ steps.setup.outputs.managed_target_dir }}
          key: cross-aarch64

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install zig
        run: |
          python -m pip install ziglang=="${{ steps.setup.outputs.zig_version }}"

      - name: Install cargo-zigbuild
        run: |
          cargo install cargo-zigbuild --version "${{ steps.setup.outputs.zigbuild_version }}" --locked

      - name: build
        run: just build

      - name: Stage managed build artifact
        id: managed_artifact
        run: |
          binary_path="$(python3 "${{ steps.setup.outputs.rust_verification_owner }}" binary-path --repo "$GITHUB_WORKSPACE" --bin bolt-v2)"
          stage_dir="$RUNNER_TEMP/bolt-v2-binary"
          rm -rf "$stage_dir"
          mkdir -p "$stage_dir"
          cp "$binary_path" "$stage_dir/bolt-v2"
          (
            cd "$stage_dir"
            sha256sum bolt-v2 > bolt-v2.sha256
          )
          echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bolt-v2-binary
          path: |
            ${{ steps.managed_artifact.outputs.stage_dir }}/bolt-v2
            ${{ steps.managed_artifact.outputs.stage_dir }}/bolt-v2.sha256
          retention-days: 30

  gate:
    name: gate
    needs: [detector, fmt-check, deny, clippy, source-fence, test, build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check required lanes
        shell: bash
        run: |
          if [[ "${{ needs.detector.result }}" != "success" ]]; then
            echo "detector did not succeed"
            exit 1
          fi
          if [[ "${{ needs.fmt-check.result }}" != "success" ]]; then
            echo "fmt-check did not succeed"
            exit 1
          fi
          if [[ "${{ needs.deny.result }}" != "success" ]]; then
            echo "deny did not succeed"
            exit 1
          fi
          if [[ "${{ needs.clippy.result }}" != "success" ]]; then
            echo "clippy did not succeed"
            exit 1
          fi
          if [[ "${{ needs.source-fence.result }}" != "success" ]]; then
            echo "source-fence did not succeed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test did not succeed"
            exit 1
          fi

          build_required="${{ needs.detector.outputs.build_required }}"
          build_result="${{ needs.build.result }}"
          if [[ "$build_required" == "true" ]]; then
            if [[ "$build_result" != "success" ]]; then
              echo "build did not succeed when build_required=true"
              exit 1
            fi
          elif [[ "$build_result" != "success" && "$build_result" != "skipped" ]]; then
            echo "build produced unexpected result '$build_result' when build_required=false"
            exit 1
          fi

  deploy:
    name: deploy
    needs: [gate, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Tag ${{ github.ref_name }} points to a commit not on main."
            echo "Deploy requires the tagged commit to be on main."
            exit 1
          fi

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bolt-v2-binary
          path: artifact/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Check idempotency
        id: check
        run: |
          TAG="${{ github.ref_name }}"
          if aws s3 ls "$S3_DEPLOY_PATH/$TAG/bolt-v2" >/dev/null 2>&1; then
            echo "Artifact already exists at $S3_DEPLOY_PATH/$TAG/ — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to S3
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${{ github.ref_name }}"
          aws s3 cp artifact/bolt-v2 "$S3_DEPLOY_PATH/$TAG/bolt-v2"
          aws s3 cp artifact/bolt-v2.sha256 "$S3_DEPLOY_PATH/$TAG/bolt-v2.sha256"
          echo "Deployed $TAG to $S3_DEPLOY_PATH/$TAG/"
