name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request'
        && format('pr-{0}', github.event.number)
        || format('{0}-{1}', github.ref_name, github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  JUST_VERSION: "1.49.0"
  S3_DEPLOY_PATH: "s3://bolt-deploy-artifacts/artifacts/bolt-v2"
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Lint workflow contract
        run: just ci-lint-workflow

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "deny_version=$(just --evaluate deny_version)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}
          components: rustfmt

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --version "${{ steps.shared.outputs.deny_version }}" --locked

      - name: fmt-check
        run: just fmt-check

      - name: deny
        run: just deny

  clippy:
    name: clippy
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}
          components: clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          cache-on-failure: true

      - name: clippy
        run: just clippy

  test:
    name: test
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "nextest_version=$(just --evaluate nextest_version)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          cache-on-failure: true

      - name: Install cargo-nextest
        run: |
          cargo install cargo-nextest --version "${{ steps.shared.outputs.nextest_version }}" --locked

      - name: test
        run: just test

  build:
    name: build
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "target=$(just --evaluate target)" >> "$GITHUB_OUTPUT"
          echo "zig_version=$(just --evaluate zig_version)" >> "$GITHUB_OUTPUT"
          echo "zigbuild_version=$(just --evaluate zigbuild_version)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}
          targets: ${{ steps.shared.outputs.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          cache-on-failure: true
          key: cross-aarch64

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install zig
        run: |
          python -m pip install ziglang=="${{ steps.shared.outputs.zig_version }}"

      - name: Install cargo-zigbuild
        run: |
          cargo install cargo-zigbuild --version "${{ steps.shared.outputs.zigbuild_version }}" --locked

      - name: build
        run: just build

      - name: Checksum
        run: |
          TARGET="${{ steps.shared.outputs.target }}"
          cd "target/$TARGET/release"
          sha256sum bolt-v2 > bolt-v2.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bolt-v2-binary
          path: |
            target/${{ steps.shared.outputs.target }}/release/bolt-v2
            target/${{ steps.shared.outputs.target }}/release/bolt-v2.sha256
          retention-days: 30

  deploy:
    name: deploy
    needs: [gate, clippy, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Tag ${{ github.ref_name }} points to a commit not on main."
            echo "Deploy requires the tagged commit to be on main."
            exit 1
          fi

      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: bolt-v2-binary
          path: artifact/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Check idempotency
        id: check
        run: |
          TAG="${{ github.ref_name }}"
          if aws s3 ls "$S3_DEPLOY_PATH/$TAG/bolt-v2" >/dev/null 2>&1; then
            echo "Artifact already exists at $S3_DEPLOY_PATH/$TAG/ — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to S3
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${{ github.ref_name }}"
          aws s3 cp artifact/bolt-v2 "$S3_DEPLOY_PATH/$TAG/bolt-v2"
          aws s3 cp artifact/bolt-v2.sha256 "$S3_DEPLOY_PATH/$TAG/bolt-v2.sha256"
          echo "Deployed $TAG to $S3_DEPLOY_PATH/$TAG/"
