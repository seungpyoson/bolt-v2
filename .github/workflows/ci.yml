name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request'
        && format('pr-{0}', github.event.number)
        || format('{0}-{1}', github.ref_name, github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  JUST_VERSION: "1.49.0"
  S3_DEPLOY_PATH: "s3://bolt-deploy-artifacts/artifacts/bolt-v2"
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Lint workflow contract
        run: just ci-lint-workflow

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "deny_version=$(just --evaluate deny_version)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_owner=$(just --evaluate rust_verification_owner)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_repo=$(just --evaluate rust_verification_source_repo)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_sha=$(just --evaluate rust_verification_source_sha)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_ci_install_script=$(just --evaluate rust_verification_ci_install_script)" >> "$GITHUB_OUTPUT"

      - name: Install managed Rust owner
        run: |
          bash "${{ steps.shared.outputs.rust_verification_ci_install_script }}" "${{ steps.shared.outputs.rust_verification_source_repo }}" "${{ steps.shared.outputs.rust_verification_source_sha }}"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}
          components: rustfmt

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --version "${{ steps.shared.outputs.deny_version }}" --locked

      - name: fmt-check
        run: just fmt-check

      - name: deny
        run: just deny

  clippy:
    name: clippy
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_owner=$(just --evaluate rust_verification_owner)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_repo=$(just --evaluate rust_verification_source_repo)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_sha=$(just --evaluate rust_verification_source_sha)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_ci_install_script=$(just --evaluate rust_verification_ci_install_script)" >> "$GITHUB_OUTPUT"

      - name: Install managed Rust owner
        run: |
          bash "${{ steps.shared.outputs.rust_verification_ci_install_script }}" "${{ steps.shared.outputs.rust_verification_source_repo }}" "${{ steps.shared.outputs.rust_verification_source_sha }}"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: clippy
        run: just clippy

  test:
    name: test
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "nextest_version=$(just --evaluate nextest_version)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_owner=$(just --evaluate rust_verification_owner)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_repo=$(just --evaluate rust_verification_source_repo)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_sha=$(just --evaluate rust_verification_source_sha)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_ci_install_script=$(just --evaluate rust_verification_ci_install_script)" >> "$GITHUB_OUTPUT"

      - name: Install managed Rust owner
        run: |
          bash "${{ steps.shared.outputs.rust_verification_ci_install_script }}" "${{ steps.shared.outputs.rust_verification_source_repo }}" "${{ steps.shared.outputs.rust_verification_source_sha }}"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Install cargo-nextest
        run: |
          cargo install cargo-nextest --version "${{ steps.shared.outputs.nextest_version }}" --locked

      - name: test
        run: just test

  build:
    name: build
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        run: |
          archive="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base_url="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/SHA256SUMS" "$base_url/SHA256SUMS"
          (
            cd "$RUNNER_TEMP"
            grep "  $archive\$" SHA256SUMS | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" just
          sudo install -m 0755 "$RUNNER_TEMP/just" /usr/local/bin/just

      - name: Read shared values
        id: shared
        shell: bash
        run: |
          echo "rust_toolchain=$(awk -F'\"' '/^channel = / {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
          echo "target=$(just --evaluate target)" >> "$GITHUB_OUTPUT"
          echo "zig_version=$(just --evaluate zig_version)" >> "$GITHUB_OUTPUT"
          echo "zigbuild_version=$(just --evaluate zigbuild_version)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_owner=$(just --evaluate rust_verification_owner)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_repo=$(just --evaluate rust_verification_source_repo)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_source_sha=$(just --evaluate rust_verification_source_sha)" >> "$GITHUB_OUTPUT"
          echo "rust_verification_ci_install_script=$(just --evaluate rust_verification_ci_install_script)" >> "$GITHUB_OUTPUT"

      - name: Install managed Rust owner
        run: |
          bash "${{ steps.shared.outputs.rust_verification_ci_install_script }}" "${{ steps.shared.outputs.rust_verification_source_repo }}" "${{ steps.shared.outputs.rust_verification_source_sha }}"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.shared.outputs.rust_toolchain }}
          targets: ${{ steps.shared.outputs.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          key: cross-aarch64

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install zig
        run: |
          python -m pip install ziglang=="${{ steps.shared.outputs.zig_version }}"

      - name: Install cargo-zigbuild
        run: |
          cargo install cargo-zigbuild --version "${{ steps.shared.outputs.zigbuild_version }}" --locked

      - name: build
        run: just build

      - name: Stage managed build artifact
        id: managed_artifact
        run: |
          binary_path="$(python3 "${{ steps.shared.outputs.rust_verification_owner }}" binary-path --repo "$GITHUB_WORKSPACE" --bin bolt-v2)"
          stage_dir="$RUNNER_TEMP/bolt-v2-binary"
          rm -rf "$stage_dir"
          mkdir -p "$stage_dir"
          cp "$binary_path" "$stage_dir/bolt-v2"
          (
            cd "$stage_dir"
            sha256sum bolt-v2 > bolt-v2.sha256
          )
          echo "stage_dir=$stage_dir" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bolt-v2-binary
          path: |
            ${{ steps.managed_artifact.outputs.stage_dir }}/bolt-v2
            ${{ steps.managed_artifact.outputs.stage_dir }}/bolt-v2.sha256
          retention-days: 30

  deploy:
    name: deploy
    needs: [gate, clippy, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Tag ${{ github.ref_name }} points to a commit not on main."
            echo "Deploy requires the tagged commit to be on main."
            exit 1
          fi

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bolt-v2-binary
          path: artifact/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Check idempotency
        id: check
        run: |
          TAG="${{ github.ref_name }}"
          if aws s3 ls "$S3_DEPLOY_PATH/$TAG/bolt-v2" >/dev/null 2>&1; then
            echo "Artifact already exists at $S3_DEPLOY_PATH/$TAG/ — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to S3
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${{ github.ref_name }}"
          aws s3 cp artifact/bolt-v2 "$S3_DEPLOY_PATH/$TAG/bolt-v2"
          aws s3 cp artifact/bolt-v2.sha256 "$S3_DEPLOY_PATH/$TAG/bolt-v2.sha256"
          echo "Deployed $TAG to $S3_DEPLOY_PATH/$TAG/"
