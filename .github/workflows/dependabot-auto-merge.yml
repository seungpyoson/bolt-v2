name: Dependabot auto-merge
on: pull_request

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Block NT pin auto-merge
        run: |
          if gh pr diff "$PR_URL" --patch | rg -n '^[+-].*(nautilus-(common|core|binance|bybit|deribit|hyperliquid|kraken|live|model|network|okx|persistence|polymarket|system|trading|execution)|nautilus_trader\.git)'; then
            echo "NT pin changes must not auto-merge through Dependabot."
            exit 1
          fi
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
