name: NT Pointer Control Plane

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  JUST_VERSION: "1.49.0"
  CARGO_TERM_COLOR: always

concurrency:
  group: nt-pointer-control-plane-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  control_plane:
    name: nt-pointer-control-plane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          lint-workflow-contract: "true"

      - name: Validate control-plane artifacts
        run: just nt-pointer-probe-validate-control-plane

      - name: Block direct NT pin changes
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash scripts/nt_pin_block_guard.sh "$GITHUB_WORKSPACE" "$BASE_REF" "$PR_NUMBER"
