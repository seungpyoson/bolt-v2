name: NT Pointer Probe Self Test

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/actions/setup-environment/action.yml"
      - ".github/workflows/nt-pointer-control-plane.yml"
      - ".github/workflows/nt-pointer-probe-self-test.yml"
      - ".github/nt-pointer-probe/**"
      - "config/nt_pointer_probe/**"
      - "src/bin/nt_pointer_probe.rs"
      - "src/nt_pointer_probe/**"
      - "tests/fixtures/nt_pointer_probe/**"
      - "tests/nt_pointer_probe_control_plane.rs"
      - "justfile"
  push:
    branches: [main]
    paths:
      - ".github/actions/setup-environment/action.yml"
      - ".github/workflows/nt-pointer-control-plane.yml"
      - ".github/workflows/nt-pointer-probe-self-test.yml"
      - ".github/nt-pointer-probe/**"
      - "config/nt_pointer_probe/**"
      - "src/bin/nt_pointer_probe.rs"
      - "src/nt_pointer_probe/**"
      - "tests/fixtures/nt_pointer_probe/**"
      - "tests/nt_pointer_probe_control_plane.rs"
      - "justfile"
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  JUST_VERSION: "1.49.0"
  CARGO_TERM_COLOR: always

concurrency:
  group: nt-pointer-probe-self-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self_test:
    name: self_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          claude-config-read-token: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
          just-version: ${{ env.JUST_VERSION }}
          lint-workflow-contract: "true"

      - name: Run NT pointer probe self-tests
        run: just nt-pointer-probe-self-test
