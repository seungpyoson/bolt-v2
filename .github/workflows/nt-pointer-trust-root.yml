name: NT Pointer Trust Root

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read

env:
  TRUST_ROOT_VALIDATOR_REPO: "seungpyoson/claude-config"
  TRUST_ROOT_VALIDATOR_SHA: ${{ vars.NT_POINTER_TRUST_ROOT_VALIDATOR_SHA }}

concurrency:
  group: nt-pointer-trust-root-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trust_root:
    name: nt-pointer-trust-root
    runs-on: ubuntu-latest
    steps:
      - name: Validate trust-root validator SHA pin
        shell: bash
        run: |
          if ! [[ "${TRUST_ROOT_VALIDATOR_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "NT_POINTER_TRUST_ROOT_VALIDATOR_SHA must be a 40-character lowercase commit SHA" >&2
            exit 1
          fi

      - name: Fetch external trust-root validator
        shell: bash
        env:
          CLAUDE_CONFIG_READ_TOKEN: ${{ secrets.CLAUDE_CONFIG_READ_TOKEN }}
        run: |
          repo_url="https://x-access-token:${CLAUDE_CONFIG_READ_TOKEN}@github.com/${TRUST_ROOT_VALIDATOR_REPO}.git"
          tmp_repo="$RUNNER_TEMP/claude-config-fetch"
          mkdir -p "$tmp_repo"
          git init -q "$tmp_repo"
          git -C "$tmp_repo" remote add origin "$repo_url"
          git -C "$tmp_repo" fetch --depth=1 --no-tags origin "${TRUST_ROOT_VALIDATOR_SHA}"

          fetched_sha="$(git -C "$tmp_repo" rev-parse FETCH_HEAD)"
          if [ "$fetched_sha" != "${TRUST_ROOT_VALIDATOR_SHA}" ]; then
            echo "ERROR: fetched validator commit $fetched_sha does not match requested ${TRUST_ROOT_VALIDATOR_SHA}" >&2
            exit 1
          fi

          git -C "$tmp_repo" show "FETCH_HEAD:lib/bolt_trust_root_validator.py" > "$RUNNER_TEMP/bolt_trust_root_validator.py"
          git -C "$tmp_repo" show "FETCH_HEAD:config/bolt-v2-trust-root-policy.json" > "$RUNNER_TEMP/bolt-v2-trust-root-policy.json"
          chmod +x "$RUNNER_TEMP/bolt_trust_root_validator.py"

      - name: Materialize protected files from PR head
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          tmp_repo="$RUNNER_TEMP/pr-head-fetch"
          mkdir -p "$tmp_repo"
          git init -q "$tmp_repo"
          git -C "$tmp_repo" remote add origin "https://github.com/${{ github.repository }}.git"
          git -C "$tmp_repo" fetch --depth=1 --no-tags origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"

          fetched_sha="$(git -C "$tmp_repo" rev-parse refs/remotes/origin/pr-head)"
          if [ "$fetched_sha" != "${HEAD_SHA}" ]; then
            echo "ERROR: fetched PR head $fetched_sha does not match expected ${HEAD_SHA}" >&2
            exit 1
          fi

          repo_root="$RUNNER_TEMP/bolt-v2-trust-root"
          mkdir -p "$repo_root"
          jq -r '.protected_entries[].path' "$RUNNER_TEMP/bolt-v2-trust-root-policy.json" | while read -r relative_path; do
            target_path="$repo_root/$relative_path"
            mkdir -p "$(dirname "$target_path")"
            git -C "$tmp_repo" show "refs/remotes/origin/pr-head:${relative_path}" > "$target_path"
          done
          printf '%s\n' "$repo_root" > "$RUNNER_TEMP/bolt-v2-trust-root-path"

      - name: Validate external trust root
        shell: bash
        run: |
          repo_root="$(cat "$RUNNER_TEMP/bolt-v2-trust-root-path")"
          python3 "$RUNNER_TEMP/bolt_trust_root_validator.py" \
            --repo "$repo_root" \
            --policy "$RUNNER_TEMP/bolt-v2-trust-root-policy.json"
