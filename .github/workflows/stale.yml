# Warns on inactive issues and pull requests using explicit project policy.
# Pull requests are never closed automatically; maintainers close stale PRs manually.
name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '39 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 180
          days-before-issue-close: 30
          days-before-pr-stale: 45
          days-before-pr-close: -1
          stale-issue-label: no-issue-activity
          stale-pr-label: no-pr-activity
          stale-issue-message: >
            This issue has had no activity for 180 days. Comment with current evidence,
            a remaining decision, or an owner to keep it active; otherwise it may be
            closed after 30 more days of inactivity.
          stale-pr-message: >
            This pull request has had no activity for 45 days. Comment, push a new
            commit, or add an exempt label if it is still an active or reference-only
            work item. This workflow will not close pull requests automatically.
          close-issue-message: >
            Closing after 30 additional days with the stale label and no activity.
            Comment with renewed evidence or scope if this should be reopened.
          exempt-issue-labels: blocked,security,pinned,tracking,reference-only
          exempt-pr-labels: blocked,security,do-not-merge,reference-only,dependencies
          exempt-draft-pr: true
          operations-per-run: 30
