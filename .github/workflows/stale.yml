# Warns on inactive issues and pull requests using explicit project policy.
# Neither issues nor pull requests are closed automatically; maintainers close them manually.
name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '39 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 180
          days-before-issue-close: -1
          days-before-pr-stale: 60
          days-before-pr-close: -1
          stale-issue-label: no-issue-activity
          stale-pr-label: no-pr-activity
          stale-issue-message: >
            This issue has had no activity for 180 days. Comment with current evidence,
            a remaining decision, or an owner to keep it active. This workflow will
            not close issues automatically.
          stale-pr-message: >
            This pull request has had no activity for 60 days. Comment, push a new
            commit, or add an exempt label if it is still an active or reference-only
            work item. This workflow will not close pull requests automatically.
          exempt-issue-labels: blocked,security,pinned,tracking,reference-only
          exempt-pr-labels: blocked,security,do-not-merge,reference-only,dependencies
          exempt-draft-pr: true
          operations-per-run: 30
