# Tracked template for the human-edited local operator config.
# Copy this file to `config/live.local.toml` and edit the local copy.
# `config/live.toml` is a generated runtime artifact; do not edit it directly.
# `just live-check` validates secret-config completeness only.
# `just live-resolve` performs actual secret resolution.
# `just live` runs using the generated runtime config.
#
# Bolt-v3 note: this file is the legacy live-config render input, not the
# bolt-v3 root TOML. A bolt-v3 root TOML used with `run_bolt_v3_live_node`
# must include `[live_canary]`; see `docs/bolt-v3/2026-04-25-bolt-v3-schema.md`.
#
#[live_canary]
#approval_id = "operator-approved-canary-001"
#no_submit_readiness_report_path = "reports/no-submit-readiness.json"
#max_no_submit_readiness_report_bytes = 4096
#max_live_order_count = 1
#max_notional_per_order = "1.00"

[node]
name = "BOLT-V2-001"
trader_id = "BOLT-001"

[logging]
stdout_level = "Info"
file_level = "Debug"

[timeouts]
connection_secs = 60
reconciliation_secs = 60
portfolio_secs = 10
disconnection_secs = 10
post_stop_delay_secs = 5
shutdown_delay_secs = 5

[polymarket]
# event_slug is only used in legacy non-ruleset mode.
# event_slug = "microstrategy-sell-any-bitcoin-in-2025"
instrument_id = "0x8213d395e079614d6c4d7f4cbb9be9337ab51648a21cc2a334ae8f1966d164b4-111128191581505463501777127559667396812474366956707382672202929745167742497287.POLYMARKET"
account_id = "POLYMARKET-001"
funder = "0xabc"
signature_type = 2
subscribe_new_markets = false
update_instruments_interval_mins = 60
gamma_refresh_interval_secs = 60
ws_max_subscriptions = 200

[secrets]
region = "eu-west-1"
pk = "/bolt/poly/pk"
api_key = "/bolt/poly/key"
api_secret = "/bolt/poly/secret"
passphrase = "/bolt/poly/passphrase"

[raw_capture]
output_dir = "/srv/bolt-v2/var/raw"

[streaming]
catalog_path = ""
flush_interval_ms = 1000
# contract_path = "contracts/polymarket.toml"

[reference]
publish_topic = "platform.reference.default"
min_publish_interval_ms = 100

[reference.binance]
region = "eu-west-1"
api_key = "/bolt/binance/api-key"
api_secret = "/bolt/binance/api-secret"
environment = "Mainnet"
product_types = ["SPOT"]
instrument_status_poll_secs = 3600

[[reference.venues]]
name = "BINANCE-BTC"
type = "binance"
instrument_id = "BTCUSDT.BINANCE"
base_weight = 0.35
stale_after_ms = 1500
disable_after_ms = 5000

[[reference.venues]]
name = "DERIBIT-BTC"
type = "deribit"
instrument_id = "BTC-PERPETUAL.DERIBIT"
base_weight = 0.20
stale_after_ms = 1500
disable_after_ms = 5000

# Uncomment the shared Chainlink block and one or more Chainlink venues when
# using Chainlink Data Streams reference prices.
#
#[reference.chainlink]
#region = "eu-west-1"
#api_key = "/bolt/testnet/chainlink/api-key"
#api_secret = "/bolt/testnet/chainlink/api-secret"
#ws_url = "wss://ws.testnet-dataengine.chain.link"
# reconnects stay infinite; this threshold only escalates repeated failures to error logs
#ws_reconnect_alert_threshold = 5
#
#[[reference.venues]]
#name = "CHAINLINK-BTC"
#type = "chainlink"
#instrument_id = "BTCUSD.CHAINLINK"
#base_weight = 1.0
#stale_after_ms = 1500
#disable_after_ms = 5000
#[reference.venues.chainlink]
#feed_id = "0x00037da06d56d083fe599397a4769a042d63aa73dc4ef57709d31e9971a5b439"
#price_scale = 18

[[rulesets]]
id = "PRIMARY"
venue = "polymarket"
resolution_basis = "binance_btcusdt_1m"
min_time_to_expiry_secs = 60
max_time_to_expiry_secs = 900
min_liquidity_num = 1000
require_accepting_orders = true
freeze_before_end_secs = 90
selector_poll_interval_ms = 1000
candidate_load_timeout_secs = 30

[rulesets.selector]
tag_slug = "bitcoin"
event_slug_prefix = "bitcoin"

# Uncomment one runtime strategy template when rulesets should activate a
# strategy at runtime. Keep the values in TOML rather than hardcoding them in
# the render/deploy path.
#
# The default active example above is still a BTC ruleset. Do not uncomment the
# ETH taker template below unless you also switch the example ruleset and
# reference venues to the matching ETH/Chainlink operator config.
#
#[[strategies]]
#type = "eth_chainlink_taker"
#[strategies.config]
#strategy_id = "ETHCHAINLINKTAKER-001"
#client_id = "POLYMARKET"
#warmup_tick_count = 20
#period_duration_secs = 300
#reentry_cooldown_secs = 30
#max_position_usdc = 1000.0
#book_impact_cap_bps = 15
#risk_lambda = 0.5
#worst_case_ev_min_bps = -20
#exit_hysteresis_bps = 5
#vol_window_secs = 60
#vol_gap_reset_secs = 10
#vol_min_observations = 20
#vol_bridge_valid_secs = 10
#pricing_kurtosis = 0.0
#theta_decay_factor = 0.0
#forced_flat_stale_chainlink_ms = 1500
#forced_flat_thin_book_min_liquidity = 100.0
#lead_agreement_min_corr = 0.8
#lead_jitter_max_ms = 250

[audit]
local_dir = "/srv/bolt-v2/var/audit"
s3_uri = "s3://bolt-runtime-history/phase1"
ship_interval_secs = 30
upload_attempt_timeout_secs = 30
roll_max_bytes = 1048576
roll_max_secs = 300
max_local_backlog_bytes = 10485760
