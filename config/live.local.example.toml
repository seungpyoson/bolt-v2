[node]
name = "BOLT-V2-001"
trader_id = "BOLT-001"

[logging]
stdout_level = "Info"
file_level = "Debug"

[timeouts]
connection_secs = 60
reconciliation_secs = 60
portfolio_secs = 10
disconnection_secs = 10
post_stop_delay_secs = 5
shutdown_delay_secs = 5

[polymarket]
event_slug = "btc-updown-5m"
instrument_id = "0xabc-12345678901234567890.POLYMARKET"
account_id = "POLYMARKET-001"
funder = "0xabc"
signature_type = 2
subscribe_new_markets = false
update_instruments_interval_mins = 60
ws_max_subscriptions = 200

[strategy]
strategy_id = "EXEC_TESTER-001"
order_qty = "5"
log_data = false
tob_offset_ticks = 5
use_post_only = true
enable_limit_sells = false
enable_stop_buys = false
enable_stop_sells = false

[secrets]
region = "eu-west-1"
pk = "/bolt/poly/pk"
api_key = "/bolt/poly/key"
api_secret = "/bolt/poly/secret"
passphrase = "/bolt/poly/passphrase"

[raw_capture]
output_dir = "var/raw"

[streaming]
catalog_path = ""
flush_interval_ms = 1000
