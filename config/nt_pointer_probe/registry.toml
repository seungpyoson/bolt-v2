[[seams]]
name = "polymarket_execution_reconciliation"
risk = "Execution and reconciliation drift can break fills, commissions, and position semantics."
bolt_usage = [
  "src/clients/polymarket.rs",
  "src/clients/polymarket/fees.rs",
  "src/execution_state.rs",
]
upstream_prefixes = [
  "crates/adapters/polymarket/src/",
  "crates/execution/src/",
  "crates/model/src/events/",
]
required_coverage = ["integration-behavior", "bootstrap-materialization"]
escalation = "fail"

