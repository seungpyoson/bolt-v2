# ============================================================
# Summary
# ============================================================
summary:
  total_subscribe_apis: 25
  captured_now: 15
  captured_now_includes:
    - 'subscribe_any("events.risk") -> TradingStateChanged'  # added in Bolt; JSONL capture risk/trading_state_changed.jsonl
  safe_missing_passive_stream:
    - subscribe_book_snapshots          # OrderBook periodic snapshots -- publisher: data/src/engine/book.rs:170; requires Bolt boundary wrapper (no serde/Arrow on OrderBook)
    - subscribe_greeks                  # GreeksData -- publisher: common/src/greeks.rs:634 (synthetic, not venue feed); not Polymarket-relevant
    - subscribe_option_greeks           # OptionGreeks -- publisher: data/src/engine/mod.rs:891; not Polymarket-relevant
    - subscribe_option_chain            # OptionChainSlice -- publisher: data/src/option_chains/manager.rs:736; not Polymarket-relevant
  no_runtime_publisher_in_pinned_nt:
    - subscribe_positions               # api.rs:451 declares it but no publisher of positions.snapshots.* exists in pinned crates -- subscribing is a no-op
  defi_feature_gated_skip:
    - subscribe_defi_blocks             # data.defi.blocks.{chain}        (switchboard.rs:89)
    - subscribe_defi_pools              # data.defi.pool.{instrument_id}  (switchboard.rs:98, singular)
    - subscribe_defi_swaps              # data.defi.pool_swaps.{instrument_id}     (switchboard.rs:107)
    - subscribe_defi_liquidity          # data.defi.pool_liquidity.{instrument_id} (switchboard.rs:116)
    - subscribe_defi_collects           # data.defi.pool_collect.{instrument_id}   (switchboard.rs:125, singular)
    - subscribe_defi_flash              # data.defi.pool_flash.{instrument_id}     (switchboard.rs:135)
  command_endpoints_unsafe_to_intercept:
    - DataCommand          # via register_data_command_endpoint / send_data_command
    - TradingCommand       # via register_trading_command_endpoint / send_trading_command
    - DataResponse         # via register_data_response_endpoint / send_data_response
    - ExecutionReport      # via register_execution_report_endpoint / send_execution_report
    - typed quote/trade/bar/order_event/account_state endpoints  # all rely on a single owned handler
    - response_handler (correlation_id request/response)
  publish_helper_apis:
    apis:
      - publish_quote
      - publish_trade
      - publish_bar
      - publish_deltas
      - publish_depth10
      - publish_book
      - publish_mark_price
      - publish_index_price
      - publish_funding_rate
      - publish_account_state
      - publish_order_event
      - publish_position_event
      - publish_any
    note: "All route via TopicRouter<T>.fill_matching_handlers (broadcast). Reclassified as api_kind: publish_helper to distinguish them from passive subscribe-side pubsub. Not capture surfaces."
  recommendation: |
    Bolt now captures the events.risk -> TradingStateChanged stream
    (JSONL capture risk/trading_state_changed.jsonl), so risk-engine state transitions
    (HALT/REDUCE/RESUME) are no longer invisible in the live capture lake.

    Remaining safe_missing_passive_stream surfaces (subscribe_book_snapshots,
    subscribe_greeks, subscribe_option_greeks, subscribe_option_chain) all have
    confirmed publishers in pinned NT but their payload types (OrderBook, GreeksData,
    OptionGreeks, OptionChainSlice) lack serde and Arrow derives, so capturing them
    requires a Bolt-side boundary wrapper that projects to a stable serializable row
    before write -- not a direct Feather/JSONL append. Defer until a Polymarket use
    case actually demands them; today none of these streams are produced for Polymarket
    instruments by the Polymarket adapter.

    subscribe_positions is reclassified out of safe_missing_passive_stream: pinned NT
    has NO publisher on positions.snapshots.*, so subscribing would be a no-op on this
    rev. Reconstruct position state from the already-captured events.position.* stream.

    Command/endpoint surfaces (register_*/send_*) MUST NOT be added to the capture
    layer: doing so would either replace or steal NT's owned dispatch handlers
    (DataEngine, ExecutionEngine, RiskEngine). If command-side capture is later
    required, do it at the adapter boundary (boundary_wrapper) or by tapping the
    existing passive event streams that mirror the command outcomes.
