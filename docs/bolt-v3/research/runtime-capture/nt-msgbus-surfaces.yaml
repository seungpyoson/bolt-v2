    reason: "Generic Any-handler endpoint registration. Signature: pub fn register_any(endpoint: MStr<Endpoint>, handler: ShareableMessageHandler). Each endpoint has at most one owning handler in NT's MessageBus; registering from the capture layer would replace whatever component (DataEngine, ExecutionEngine, RiskEngine, BookEngine) already owns that endpoint name."
