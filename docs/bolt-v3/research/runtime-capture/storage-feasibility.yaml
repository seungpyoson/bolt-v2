    recommended_storage: unwrap_to_orderbookdelta
    reason: "Container is NOT persisted directly. NT publishes a batch via subscribe_book_deltas (crates/common/src/msgbus/api.rs:273) carrying OrderBookDeltas, and Bolt unwraps the batch on receipt -- iterating deltas.deltas and calling FeatherWriter::write(delta) per element (src/nt_runtime_capture.rs ~535-543, in the OrderBookDeltas arm of write_capture_message). The Arrow row schema lives on OrderBookDelta, not on the container. Do NOT add a separate storage path for OrderBookDeltas."

