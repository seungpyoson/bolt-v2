# Bolt-v3 runtime literal audit.
#
# The verifier scans production code in root src/bolt_v3_*.rs files and files
# under src/bolt_v3_* module directories, skips tests and diagnostics by rule,
# and requires every remaining candidate runtime literal to be recorded here
# with a classification and rationale.

