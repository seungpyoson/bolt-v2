kind = "string"
literal = "\"nautilus_polymarket::common::credential\""
context = "pub const CREDENTIAL_LOG_MODULES: &[&str] = &[\"nautilus_polymarket::common::credential\"];"
classification = "provider_credential_log_module"
reason = "The Polymarket provider binding owns the NT credential-log module path that Bolt-v3 forces to WARN before LiveNode construction."

