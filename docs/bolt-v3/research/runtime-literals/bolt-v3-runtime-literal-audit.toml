# Bolt-v3 runtime literal audit.
#
# The verifier scans production code in src/bolt_v3_*.rs, skips tests and
# diagnostics by rule, and requires every remaining candidate runtime literal to
# be recorded here with a classification and rationale.

[[allowed]]
path = "src/bolt_v3_adapters.rs"
kind = "number"
literal = "100"
context = "auto_load_debounce_ms: 100,"
classification = "accepted_current_residual"
reason = "Pinned NT Polymarket data config needs a debounce value. This is a current provider-adapter residual tracked by status-map rows 14 and 24, not a new runtime value."

[[allowed]]
path = "src/bolt_v3_live_node.rs"
kind = "string"
literal = "\"nautilus_polymarket::common::credential\""
context = "\"nautilus_polymarket::common::credential\","
classification = "accepted_current_residual"
reason = "Credential-log suppression metadata is currently centralized in the Bolt-v3 builder path and tracked as a provider-binding residual in status-map row 17."

