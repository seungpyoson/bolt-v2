# Bolt-v3 runtime literal audit.
#
# The verifier scans production code in root src/bolt_v3_*.rs files and files
# under src/bolt_v3_* module directories, skips tests and diagnostics by rule,
# and requires every remaining candidate runtime literal to be recorded here
# with a classification and rationale.

[[allowed]]
path = "src/bolt_v3_providers/polymarket.rs"
kind = "number"
literal = "100"
context = "auto_load_debounce_ms: 100,"
classification = "accepted_current_residual"
reason = "The Polymarket provider binding owns the pinned NT data config debounce residual. This is a current provider-adapter residual, not a new core runtime value."

[[allowed]]
path = "src/bolt_v3_adapters.rs"
kind = "number"
literal = "0_i64"
context = "let zero_clock: BoltV3UpdownNowFn = Arc::new(|| 0_i64);"
classification = "no_identity_clock_sentinel"
reason = "The no-identity adapter entry point supplies an empty market-identity plan, so this deterministic clock closure is never invoked and is documented as a sentinel for that no-filter path."

